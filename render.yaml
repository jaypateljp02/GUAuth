services:
  - type: web
    name: gu-auth-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: "postgresql://assurement:Arnav%402541@103.35.164.95:5432/Groundupfactory?sslmode=prefer"
      - key: JWT_SECRET
        value: ground-up-dev-secret-change-in-production
      - key: JWT_ALGORITHM
        value: HS256
      - key: CORS_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"
